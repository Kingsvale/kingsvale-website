services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    ports:
      - "${POSTGRES_HOST_PORT:-5433}:5432"
    environment:
      POSTGRES_DB: taskforge
      POSTGRES_USER: taskforge
      POSTGRES_PASSWORD: taskforge
    volumes:
      - taskforge_postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U taskforge -d taskforge"]
      interval: 10s
      timeout: 5s
      retries: 10

  app:
    build: .
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "${HOST_PORT:-8092}:3000"
    environment:
      DATABASE_URL: postgresql://taskforge:taskforge@postgres:5432/taskforge?schema=public
      SESSION_SECRET: ${SESSION_SECRET:-replace-this-with-a-random-32-character-secret}
      NEXT_PUBLIC_APP_URL: ${APP_PUBLIC_URL:-http://localhost:8092}
      SECURE_COOKIES: ${SECURE_COOKIES:-false}
      NODE_ENV: production

volumes:
  taskforge_postgres:
